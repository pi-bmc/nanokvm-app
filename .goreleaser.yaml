version: 2

before:
  hooks:
    - go mod tidy
    - bash -c "echo '{{ .Version }}' > version"

builds:
  - id: server
    env: ["CGO_ENABLED=0"]
    main: ./cmd/server
    binary: server/NanoKVM-Server
    flags:
      - -trimpath # reproducible builds; strips build-tree paths from the binary
    ldflags:
      - -s # strip symbol table (~20% size reduction)
      - -w # strip DWARF debug info (~25% size reduction)
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
    goarch:
      - riscv64
  - id: rpiboot
    env: ["CGO_ENABLED=0"]
    main: ./cmd/rpiboot
    binary: system/usr/bin/rpiboot
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
    goos:
      - linux
    goarch:
      - riscv64

upx:
  - enabled: false
    compress: best
    lzma: true

archives:
  - id: nanokvm
    ids:
      - server
      - rpiboot
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}"
    files:
      - src: packaging/etc/init.d/*
        dst: system/etc/init.d
        info:
          mode: 0755
      - LICENSE
      - README.md
      - version

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: BMCPi
    name: NanoKVM
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
  make_latest: true

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  disable: "{{ .IsSnapshot }}"
